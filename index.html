    .gradient-bg{
      position:fixed;
      inset:0;
      z-index:0;
      overflow:hidden

    .gradient-bg:before{
      content:'';
      position:absolute;
      width:200%;
      height:200%;
      top:-50%;
      left:-50%;
      background:linear-gradient(45deg,#0a0a0f,#1a0a1f,#0f1a2e,#1a1a0f,#0a1a1a,#0a0a0f);
      background-size:400% 400%;
      animation:gradientShift 20s infinite linear

    @keyframes gradientShift{
      0%{background-position:0 0;transform:rotate(0)}
      50%{background-position:100% 100%;transform:rotate(180deg)}
      100%{background-position:0 0;transform:rotate(360deg)}
    }

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.4;
      animation:orbFloat 18s infinite ease-in-out
    }

    .orb1{width:400px;height:400px;background:#ffc200;top:-100px;left:-100px}
    .orb2{width:350px;height:350px;background:#ff8c00;bottom:-100px;right:-100px}
    .orb3{width:300px;height:300px;background:#daa520;top:45%;left:50%;transform:translate(-50%,-50%)}

    @keyframes orbFloat{
      0%,100%{transform:translate(0,0) scale(1)}
      50%{transform:translate(30px,-30px) scale(1.1)}
    }

    .grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,194,0,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,194,0,.03) 1px,transparent 1px);
      background-size:50px 50px;
      transform:perspective(500px) rotateX(60deg);
      animation:gridMove 30s linear infinite
    }

    @keyframes gridMove{
      from{transform:perspective(500px) rotateX(60deg) translateY(0)}
      to{transform:perspective(500px) rotateX(60deg) translateY(50px)}
    }

    .particles{position:fixed;inset:0;pointer-events:none;z-index:1}

    .particle{
      position:absolute;
      width:4px;
      height:4px;
      background:linear-gradient(45deg,#ffc200,#ff6b00);
      border-radius:50%;
      opacity:.6;
      animation:float 20s infinite
    }

    @keyframes float{
      0%{transform:translateY(100vh) scale(0);opacity:0}
      10%,90%{opacity:.6}
      100%{transform:translateY(-10vh) scale(1);opacity:0}

    .container{
